services:

  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_URI: mongodb://mongo:27017/ma_base

  backend:
    build: ./server
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build: ./frontemploye
    container_name: frontend
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend

networks:
  default:
    driver: bridge

volumes:
  mongo-data: